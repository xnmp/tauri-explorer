name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: echo "version=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
      - id: check
        run: |
          if git ls-remote --tags origin "${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version-check
    if: needs.version-check.outputs.tag_exists == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and tauri-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-tauri-

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked || true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - run: bun install

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  build-arch:
    needs: version-check
    if: needs.version-check.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git rust cargo webkit2gtk-4.1 gtk3 libsoup3 \
            pango cairo gdk-pixbuf2 glib2 librsvg openssl pkgconf unzip

      - uses: actions/checkout@v4

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Build with makepkg
        run: |
          useradd -m builder
          mkdir -p /tmp/build/out
          cp -a . /tmp/build/tauri-explorer
          cp PKGBUILD /tmp/build/
          chown -R builder:builder /tmp/build
          # Make cargo and bun accessible to builder
          cp -a "$HOME/.cargo" /home/builder/.cargo
          cp -a "$HOME/.bun" /home/builder/.bun
          chown -R builder:builder /home/builder/.cargo /home/builder/.bun
          cd /tmp/build
          su builder -c 'export PATH="/tmp/build/tauri-explorer/node_modules/.bin:/home/builder/.cargo/bin:/home/builder/.bun/bin:$PATH" && _srcdir=/tmp/build/tauri-explorer makepkg -ef --nocheck PKGDEST=/tmp/build/out'

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: bundles-arch-pkg
          path: /tmp/build/out/*.pkg.tar.zst

  release:
    needs: [version-check, build, build-arch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          find artifacts -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.exe' -o -name '*.pkg.tar.zst' \) > /tmp/assets.txt
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            $(cat /tmp/assets.txt | sed 's/^/"/;s/$/"/' | tr '\n' ' ')
