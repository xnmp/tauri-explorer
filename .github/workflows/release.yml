name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: echo "version=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
      - id: check
        run: |
          if git ls-remote --tags origin "${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version-check
    if: needs.version-check.outputs.tag_exists == 'false'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and tauri-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri
          key: Linux-cargo-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: Linux-cargo-tauri-

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked || true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - run: bun install

      - name: Build Tauri app
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    needs: [version-check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          find artifacts -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) > /tmp/assets.txt
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            $(cat /tmp/assets.txt | sed 's/^/"/;s/$/"/' | tr '\n' ' ')
